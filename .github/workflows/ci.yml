# Gate for PRs: the app must build with the same toolchain the release
# workflow uses, and the full test suite (unit + fixture-signature + stub E2E)
# must pass.
name: ci

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Build RealmChat.exe (net48)
        shell: bash
        run: dotnet build src/RealmChat -c Release -o out

      - name: Compile the test stub
        shell: pwsh
        run: |
          & "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /nologo /out:out\ollama-stub.exe tools\OllamaStub\ollama-stub.cs
          if (-not (Test-Path out\ollama-stub.exe)) { exit 1 }

      - name: Build + run the tests
        shell: bash
        env:
          REALMCHAT_TEST_STUB: out/ollama-stub.exe
          REALMCHAT_TEST_FIXTURES: tools/Tests/fixtures
        run: |
          dotnet build tools/Tests -c Release -o out-tests
          ./out-tests/RealmChat.Tests.exe
